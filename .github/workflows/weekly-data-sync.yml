name: Weekly Data Sync

on:
  schedule:
    - cron: '0 17 * * 3'  # Wednesday 9 AM PST / 10 AM PDT
  workflow_dispatch:  # Manual trigger

jobs:
  sync-data:
    name: Sync MNP Data to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update submodule to latest
        id: submodule
        run: |
          BEFORE=$(git submodule status mnp-data-archive | awk '{print $1}' | sed 's/^+//')
          echo "before=$BEFORE" >> $GITHUB_OUTPUT

          git submodule update --remote mnp-data-archive

          AFTER=$(git submodule status mnp-data-archive | awk '{print $1}' | sed 's/^+//')
          echo "after=$AFTER" >> $GITHUB_OUTPUT

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in data archive"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Submodule updated from $BEFORE to $AFTER"
          fi

      - name: Detect changed seasons
        id: detect
        if: steps.submodule.outputs.changed == 'true'
        run: |
          cd mnp-data-archive

          CHANGED_FILES=$(git diff --name-only ${{ steps.submodule.outputs.before }}..${{ steps.submodule.outputs.after }})

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Only process seasons 20+ (earlier seasons are too old to be useful)
          SEASONS=$(echo "$CHANGED_FILES" | grep -oP 'season-\K\d+' | sort -nu | awk '$1 >= 20' | tr '\n' ' ')

          if [ -z "$SEASONS" ]; then
            echo "No season data files changed"
            echo "seasons=" >> $GITHUB_OUTPUT
          else
            echo "Changed seasons: $SEASONS"
            echo "seasons=$SEASONS" >> $GITHUB_OUTPUT
          fi

      - name: Load data to production database
        if: steps.detect.outputs.seasons != ''
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -e

          SEASONS="${{ steps.detect.outputs.seasons }}"
          echo "Detected seasons with changes: $SEASONS"

          # Filter to only seasons with matches directory
          VALID_SEASONS=""
          for season in $SEASONS; do
            if [ -d "mnp-data-archive/season-$season/matches" ]; then
              VALID_SEASONS="$VALID_SEASONS $season"
            else
              echo "Skipping season $season - no matches directory yet"
            fi
          done

          VALID_SEASONS=$(echo "$VALID_SEASONS" | xargs)  # Trim whitespace

          if [ -z "$VALID_SEASONS" ]; then
            echo "No seasons with match data to process"
            exit 0
          fi

          echo "Running ETL for seasons: $VALID_SEASONS"

          # Step 1: Load raw match data for all seasons
          echo ""
          echo "=========================================="
          echo "Step 1: Loading raw data"
          echo "=========================================="
          for season in $VALID_SEASONS; do
            python etl/load_season.py --season $season
          done

          # Step 2: Run weekly-relevant aggregations only
          # Skip: calculate_percentiles.py, calculate_player_stats.py
          # (These should only be recalculated at season end, not weekly)
          echo ""
          echo "=========================================="
          echo "Step 2: Calculating weekly aggregations"
          echo "=========================================="
          for season in $VALID_SEASONS; do
            python etl/calculate_team_machine_picks.py --season $season
            python etl/calculate_match_points.py --season $season
          done

          # Step 3: Calculate cross-season player totals
          echo ""
          echo "=========================================="
          echo "Step 3: Calculating cross-season totals"
          echo "=========================================="
          python etl/calculate_player_totals.py

          echo ""
          echo "ETL completed successfully"

      - name: Revalidate frontend static pages
        if: steps.detect.outputs.seasons != ''
        env:
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          if [ -z "$REVALIDATION_SECRET" ]; then
            echo "REVALIDATION_SECRET not configured, skipping frontend refresh"
            exit 0
          fi

          echo "Refreshing frontend static pages..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://pinball.salishmushrooms.com/api/revalidate?secret=$REVALIDATION_SECRET")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Static pages refreshed successfully"
          else
            echo "Warning: Revalidation returned HTTP $HTTP_CODE"
          fi

      - name: Create workflow summary
        if: always()
        run: |
          echo "# MNP Data Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.submodule.outputs.changed }}" != "true" ]; then
            echo "## No Changes" >> $GITHUB_STEP_SUMMARY
            echo "Data archive is up to date. No ETL execution needed." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.detect.outputs.seasons }}" = "" ]; then
            echo "## Submodule Changed" >> $GITHUB_STEP_SUMMARY
            echo "Submodule updated but no season match data was affected." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Sync Successful" >> $GITHUB_STEP_SUMMARY
            echo "Processed seasons: **${{ steps.detect.outputs.seasons }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Production database updated" >> $GITHUB_STEP_SUMMARY
            echo "- Frontend static pages revalidated" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Sync Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
